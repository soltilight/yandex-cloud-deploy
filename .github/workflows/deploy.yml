name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main

env:
  REGISTRY_ID: crp8bebq95mghbjc8o4b
  VM_USER: alice
  VM_HOST: 158.160.216.251
  CONTAINER_NAME: test-app

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        run: |
          echo '${{ secrets.YC_AUTHORIZED_KEY }}' | docker login \
            --username json_key \
            --password-stdin \
            cr.yandex

      - name: Build and Push Docker Image
        run: |
          docker build -t cr.yandex/$REGISTRY_ID/test-nginx:${{ github.sha }} .
          docker tag cr.yandex/$REGISTRY_ID/test-nginx:${{ github.sha }} cr.yandex/$REGISTRY_ID/test-nginx:latest
          docker push cr.yandex/$REGISTRY_ID/test-nginx:${{ github.sha }}
          docker push cr.yandex/$REGISTRY_ID/test-nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy to VM
    
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo '${{ secrets.YC_AUTHORIZED_KEY }}' | docker login --username json_key --password-stdin cr.yandex
            docker pull cr.yandex/${{ env.REGISTRY_ID }}/test-nginx:latest
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d --name ${{ env.CONTAINER_NAME }} -p 80:80 --restart unless-stopped cr.yandex/${{ env.REGISTRY_ID }}/test-nginx:latest
            echo "✅ Деплой завершён!"
            docker ps | grep ${{ env.CONTAINER_NAME }}
